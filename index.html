<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fractal Explorer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>Fractal Explorer</h1>
      <div class="header-actions">
        <button type="button" class="btn-icon" id="btn-fullscreen" title="Fullscreen (F)">⛶</button>
        <button type="button" class="btn-icon" id="btn-export" title="Export PNG (Ctrl+E)">↓</button>
        <button type="button" class="btn-icon" id="btn-copy" title="Copy to clipboard">⎘</button>
        <button type="button" class="btn-icon" id="btn-share" title="Copy share URL">🔗</button>
        <button type="button" class="btn-reset" id="reset-view" title="Reset zoom (R)">Reset</button>
        <nav class="fractal-tabs" id="fractal-tabs">
        <button class="tab active" data-fractal="mandelbrot">Mandelbrot</button>
        <button class="tab" data-fractal="julia">Julia</button>
        <button class="tab" data-fractal="burning-ship">Burning Ship</button>
        <button class="tab" data-fractal="tricorn">Tricorn</button>
        <button class="tab" data-fractal="newton">Newton</button>
      </nav>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <section class="controls-section">
          <h3>Parameters</h3>
          <div class="control-group">
            <label for="max-iter">Max iterations <span class="control-value" id="max-iter-val">150</span></label>
            <input type="range" id="max-iter" min="20" max="500" value="150">
          </div>
          <div class="control-group julia-only" id="julia-c-group">
            <label>Julia c</label>
            <div class="input-row">
              <input type="number" id="julia-c-real" value="-0.7" step="0.01" placeholder="Real">
              <input type="number" id="julia-c-imag" value="0.27" step="0.01" placeholder="Imag">
            </div>
          </div>
        </section>
        <section class="controls-section">
          <h3>Performance</h3>
          <div class="control-group control-row">
            <input type="checkbox" id="use-workers" checked>
            <label for="use-workers">Use Web Workers (parallel rendering)</label>
          </div>
          <div class="control-group">
            <label>Quality</label>
            <div class="quality-tabs">
              <button type="button" class="quality-btn" data-quality="speed">Speed</button>
              <button type="button" class="quality-btn active" data-quality="balanced">Balanced</button>
              <button type="button" class="quality-btn" data-quality="quality">Quality</button>
            </div>
          </div>
        </section>
        <section class="colors-section">
          <h3>Colors</h3>
          <div class="control-group">
            <label for="bg-color">Background</label>
            <input type="color" id="bg-color" value="#000000">
          </div>
          <div class="control-group">
            <label>Palette</label>
            <div class="palette-grid" id="palette-grid"></div>
          </div>
          <div class="control-group">
            <label for="palette-offset">Palette offset</label>
            <input type="range" id="palette-offset" min="0" max="100" value="0">
          </div>
        </section>
        <section class="controls-section">
          <h3>Explore</h3>
          <div class="control-group">
            <label>Interesting spots</label>
            <div class="preset-btns" id="interesting-spots"></div>
          </div>
          <div class="control-group" id="bookmarks-group">
            <label>Bookmarks</label>
            <div class="preset-btns" id="bookmarks-list"></div>
            <button type="button" class="btn-save-bookmark" id="save-bookmark">Save current view</button>
          </div>
          <div class="control-group control-row">
            <input type="checkbox" id="animate-palette">
            <label for="animate-palette">Animate palette</label>
          </div>
          <div class="control-group control-row">
            <input type="checkbox" id="animate-motion">
            <label for="animate-motion">Float motion (tentacle-like)</label>
          </div>
          <div class="control-group">
            <label for="animate-quality">Animation quality</label>
            <select id="animate-quality">
              <option value="speed">Speed</option>
              <option value="balanced" selected>Balanced</option>
              <option value="quality">Quality</option>
            </select>
          </div>
        </section>
      </aside>

      <div class="canvas-container" id="canvas-container">
        <div class="loading-skeleton" id="loading-skeleton"></div>
        <canvas id="fractal-canvas"></canvas>
        <div class="zoom-hint" id="zoom-hint">Scroll to zoom • Drag to pan • R=reset • 1–5=fractals • F=fullscreen <span id="click-hint" class="click-hint"></span></div>
        <div class="refining-indicator" id="refining-indicator">Refining…</div>
      </div>
    </main>

    <footer class="footer">
      <span id="coords">x: 0, y: 0</span>
      <span id="zoom-level">Zoom: 1x</span>
      <span id="iterations-display">Iterations: 150</span>
    </footer>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
